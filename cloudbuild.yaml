# Google Cloud Build config for Contractor CFO Dashboard -> Cloud Run.
#
# Public (NEXT_PUBLIC_*) values are passed via --build-arg so Next.js
# inlines them into the client bundle. Private values (service-role
# keys, Stripe secret, Anthropic, etc.) are NOT set here — they live
# as Cloud Run runtime env vars / Secret Manager references on the
# service itself.
#
# Manual invocation:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=\
# _NEXT_PUBLIC_SUPABASE_URL=https://oxvmsubkebhgvmxkftwa.supabase.co,\
# _NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJ...,\
# _NEXT_PUBLIC_APP_URL=https://topbuildercfo.com,\
# _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_live_...
#
# Trigger invocation: wire the same _NEXT_PUBLIC_* substitutions into
# the Cloud Build Trigger (GitHub push to main).

substitutions:
  _REGION: us-central1
  _SERVICE: contractor-cfo-dashboard
  _AR_REPO: cloud-run-source-deploy
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _NEXT_PUBLIC_APP_URL: 'https://topbuildercfo.com'
  _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ''

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/${_SERVICE}:${COMMIT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/${_SERVICE}:latest'

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '--no-cache'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/${_SERVICE}:${COMMIT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/${_SERVICE}:latest'
      - '-f'
      - Dockerfile
      - '.'

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/${_SERVICE}'

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE}
      - --platform=managed
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}/${_SERVICE}:${COMMIT_SHA}
      - --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=${COMMIT_SHA},gcb-build-id=${BUILD_ID}
      - --region=${_REGION}
      - --quiet
